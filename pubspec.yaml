name: herechoes
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+10

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.0.1
  superellipse_shape: ^0.2.0
  flutter_svg: ^2.0.7
  vertical_card_pager: ^1.6.3
  card_stack_widget: ^0.1.6
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  http: ^1.2.1
  share_plus: ^12.0.0
  path_provider: ^2.1.4
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  url_launcher: ^6.3.1
  purchases_flutter: ^9.14.0
  sign_in_with_apple: ^7.0.1
  firebase_core: ^4.5.0
  google_sign_in: ^6.2.1
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/system/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/data/her_echoes.json
    - assets/data/wildcard.json
    - assets/images/home/
    - assets/images/system/
    - assets/images/system/login/
    - assets/content/legal_content.json
    - assets/images/system/bg-pattern.png
    - assets/images/onboarding/