name: herechoes
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  phosphor_flutter: ^2.0.1
  superellipse_shape: ^0.2.0
  flutter_svg: ^2.0.7
  vertical_card_pager: ^1.6.3
  card_stack_widget: ^0.1.6
  provider: ^6.1.2
  shared_preferences: ^2.2.2
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/her_echoes.json
    - assets/data/wildcard.json
    - assets/images/home/
    - assets/images/system/
    - assets/images/system/login/
    - assets/content/legal_content.json
    - assets/images/system/bg-pattern.png
    - assets/images/onboarding/